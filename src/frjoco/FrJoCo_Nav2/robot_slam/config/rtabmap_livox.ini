; RTAB-Map configuration for Livox MID-360 3D LiDAR (2D ground robot)
; Generated for FrJoCo mobile manipulator — edit and tune as needed.

[Core]

[Reg]
; Force planar (x, y, yaw) registration — essential for ground robot
Force3DoF=true

[Grid]
; 2D occupancy grid (not 3D voxels)
3D=false
; Grid from LiDAR scan, not depth image
FromDepth=false
; Map resolution in metres
CellSize=0.05
; Ray-cast max range for free-space marking
MaxObstacleHeight=1.0
MinGroundHeight=-0.5

[Icp]
; Voxel downsampling size — larger = faster but less accurate
VoxelSize=0.1
; Point-to-point ICP (point-to-plane requires normals, heavier for Livox)
PointToPlane=false
; Reject ICP if translation is too large (outlier rejection)
MaxTranslation=0.5
; Iterations
Iterations=30

[RGBD]
; Refine odometry with neighbouring submaps
NeighborLinkRefining=true
; Enable proximity detection by space (loop closure)
ProximityBySpace=true
; Angular update threshold (rad) before adding a new node
AngularUpdate=0.1
; Linear update threshold (m) before adding a new node
LinearUpdate=0.1

[Mem]
; Short-term memory size (number of recent nodes kept in RAM)
STMSize=30
